<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Air - Choose Your Meal</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#eef5ff;
}

header{
    background:#003b8e;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    margin:0;
}

.container{
    max-width:900px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    margin-bottom:25px;
    overflow:hidden;
}

.card img{
    width:100%;
    display:block;
}

.info{
    padding:20px;
}

button{
    background:#0066cc;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🍽️ Royal Air Meal Selection</h1>
<p>Select your complimentary meal</p>
</header>

<div class="container">

<div class="card">
<img src="https://picsum.photos/800/350?random=1">
<div class="info">
<h2>🍗 Grilled Chicken</h2>
<p>Served with rice and vegetables.</p>
<button onclick="window.location.href='passenger.html'">
    Select Meals
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/800/350?random=2">
<div class="info">
<h2>🥩 Beef Steak</h2>
<p>Served with mashed potatoes.</p>
<button onclick="window.location.href='passenger.html'">
    Select Meal
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/800/350?random=3">
<div class="info">
<h2>🥗 Vegetarian Meal</h2>
<p>Fresh vegetables with pasta.</p>
<button onclick="localStorage.setItem('meal','Vegetarian Meal'); window.location.href='passenger.html'">
    Select Meal
</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/800/350?random=4">
<div class="info">
<h2>🐟 Grilled Fish</h2>
<p>Served with potatoes and salad.</p>
<button onclick="window.location.href='passenger.html'">
    Select Meal

</div>
</div>

</div>

</body>
</html>
