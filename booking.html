<!DOCTYPE html>
<html>
<head>
<title>Book a Flight - Royal Air</title>
<style>
body{
font-family:Arial,sans-serif;
background:#0b1d3a;
color:white;
text-align:center;
padding:30px;
}
input,select{
padding:10px;
margin:10px;
width:250px;
font-size:18px;
}
button{
background:gold;
color:black;
border:none;
padding:15px 30px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Book Your Flight</h1>

<p>Your Name</p>
<input type="text" placeholder="Enter your name">

<p>Choose Your Seat</p>
<select>
<option>1A</option>
<option>1B</option>
<option>2A</option>
<option>2B</option>
<option>3A</option>
<option>3B</option>
</select>

<p>Choose Your Meal</p>
<select>
<option>Chicken</option>
<option>Beef</option>
<option>Pasta</option>
<option>Vegetarian</option>
</select>

<br><br>

<button onclick="alert('Booking received!')">
Confirm Booking
</button>

</body>
</html>
