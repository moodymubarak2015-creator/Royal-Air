<!DOCTYPE html>
<html>
<head>
<title>Royal Air - Search Flights</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1d3a;
color:white;
}

.header{
background:linear-gradient(90deg,#08162f,#0b2c5f);
padding:25px;
text-align:center;
}

.header h1{
color:gold;
font-size:48px;
margin:0;
}

.header p{
font-size:20px;
}

.box{
background:white;
color:black;
width:90%;
max-width:700px;
margin:40px auto;
padding:30px;
border-radius:18px;
}

input,select{
width:100%;
padding:14px;
margin:10px 0;
font-size:18px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:16px;
background:gold;
border:none;
font-size:22px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ffd700;
}

footer{
text-align:center;
padding:30px;
color:#ddd;
}
</style>

</head>

<body>

<div class="header">
<h1>ROYAL AIR</h1>
<p>Fly Beyond Luxury</p>
</div>

<div class="box">

<h2>Search Flights</h2>

<select>
<option>From - Cairo (CAI)</option>
<option>From - Paris (CDG)</option>
<option>From - London (LHR)</option>
<option>From - Dubai (DXB)</option>
</select>

<select>
<option>To - Paris (CDG)</option>
<option>To - London (LHR)</option>
<option>To - Dubai (DXB)</option>
<option>To - Cairo (CAI)</option>
</select>

<input type="date">

<select>
<option>1 Passenger</option>
<option>2 Passengers</option>
<option>3 Passengers</option>
<option>4 Passengers</option>
</select>

<select>
<option>Economy Class</option>
<option>Business Class</option>
<option>First Class</option>
</select>

<button onclick="window.location.href='flights.html'">
    Search Flights
</button>

</div>

<footer>
© Royal Air
</footer>

</body>
</html>
