<html lang="en">
<head>

<body>

<h1>💺 Choose Your Seat</h1>

<p>Please select your seat:</p>

<button onclick="localStorage.setItem('seat', randomSeat()); window.location.href='meals.html'">1A</button>
<button>1B</button>
<button>1C</button>
<button>1D</button>

<br><br>

<button>2A</button>
<button>2B</button>
<button>2C</button>
<button>2D</button>

<script>
function randomSeat() {
  const rows = Math.floor(Math.random() * 30) + 1;
  const letters = ["A","B","C","D","E","F"];
  return rows + letters[Math.floor(Math.random() * letters.length)];
}
</script>br><br>

<button>3A</button>
<button>3B</button>
<button>3C</button>
<button>3D</button>

<br><br>

<button onclick="window.location.href='meals.html'">
    Continue
</button>

</body>
